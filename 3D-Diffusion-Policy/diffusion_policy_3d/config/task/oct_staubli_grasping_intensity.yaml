# Task config for OCT Staubli grasping with intensity channel (XYZI).
# Use this config when the dataset was converted with --include_intensity.
# Requires use_pc_color: true in the policy config to keep the 4th channel.

name: oct_staubli_grasping_intensity
task_name: oct_staubli_grasping_intensity

shape_meta: &shape_meta
  obs:
    point_cloud:
      shape: [2048, 4]
      type: point_cloud
    agent_pos:
      shape: [1]
      type: low_dim
  action:
    shape: [10]

env_runner: null

dataset:
  _target_: diffusion_policy_3d.dataset.oct_dataset.OCTDataset
  zarr_path: data/oct_staubli_dp3.zarr
  horizon: ${horizon}
  pad_before: ${eval:'${n_obs_steps}-1'}
  pad_after: ${eval:'${n_action_steps}-1'}
  seed: 42
  val_ratio: 0.02
  max_train_episodes: null
